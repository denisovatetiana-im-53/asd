
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №3 - Варіант 5310</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        canvas { border: 2px solid #333; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { margin: 10px; padding: 10px; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Графічне представлення графа (5310)</h2>
    <div class="controls">
    </div>
    <canvas id="graphCanvas" width="800" height="800"></canvas>

    <script>
        const isDirected = false; 
        const N = 11;           
        const radius = 25;      
        const mainRadius = 300; 
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;


        function mulberry32(a) {
            return function() {
              let t = a += 0x6D2B79F5;
              t = Math.imul(t ^ t >>> 15, t | 1);
              t ^= t + Math.imul(t ^ t >>> 7, t | 61);
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const rand = mulberry32(5310);

        let adjMatrix = [];
        const k = 1.0 - 1 * 0.02 - 0 * 0.005 - 0.25;

        for (let i = 0; i < N; i++) {
            adjMatrix[i] = [];
            for (let j = 0; j < N; j++) {
                let val = rand() * 2.0;
                adjMatrix[i][j] = (val * k >= 1.0) ? 1 : 0;
            }
        }


        console.log("Не напрямлена матриця (A_dir):");
        console.table(adjMatrix);


        const vertices = [];
        for (let i = 0; i < N; i++) {
            const angle = (2 * Math.PI * i) / N;
            vertices.push({
                x: centerX + mainRadius * Math.cos(angle),
                y: centerY + mainRadius * Math.sin(angle)
            });
        }

        function drawArrow(x1, y1, x2, y2) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const targetX = x2 - radius * Math.cos(angle);
            const targetY = y2 - radius * Math.sin(angle);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(targetX, targetY);
            ctx.lineTo(targetX - 12 * Math.cos(angle - Math.PI / 8), targetY - 12 * Math.sin(angle - Math.PI / 8));
            ctx.moveTo(targetX, targetY);
            ctx.lineTo(targetX - 12 * Math.cos(angle + Math.PI / 8), targetY - 12 * Math.sin(angle + Math.PI / 8));
            ctx.stroke();
        }

        function drawLoop(x, y) {
            const angle = Math.atan2(y - centerY, x - centerX);
            const loopX = x + 20 * Math.cos(angle);
            const loopY = y + 20 * Math.sin(angle);
            ctx.beginPath();
            ctx.arc(loopX, loopY, 15, 0, Math.PI * 2);
            ctx.stroke();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#444";
            ctx.lineWidth = 1.2;

            for (let i = 0; i < N; i++) {
                for (let j = 0; j < N; j++) {
                    let hasEdge = false;
                    
                    if (isDirected) {
                        hasEdge = (adjMatrix[i][j] === 1);
                    } else {
                        hasEdge = (adjMatrix[i][j] === 1 || adjMatrix[j][i] === 1);
                    }

                    if (hasEdge) {
                        if (i === j) {
                            drawLoop(vertices[i].x, vertices[i].y);
                        } else {
                            if (isDirected) {
                                drawArrow(vertices[i].x, vertices[i].y, vertices[j].x, vertices[j].y);
                            } else {
                                if (j > i) {
                                    ctx.beginPath();
                                    ctx.moveTo(vertices[i].x, vertices[i].y);
                                    ctx.lineTo(vertices[j].x, vertices[j].y);
                                    ctx.stroke();
                                }
                            }
                        }
                    }
                }
            }

            vertices.forEach((v, i) => {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(v.x, v.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "black";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = "black";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(i + 1, v.x, v.y);
            });
        }

        render();
    </script>
</body>
