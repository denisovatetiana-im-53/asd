

<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №3 - Варіант 5310</title>
    <style>
        canvas { border: 2px solid #333; background: #fafafa; display: block; margin: 20px auto; }
        h2 { text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>
    <h2>Графічне представлення графа</h2>
    <canvas id="graphCanvas" width="700" height="700"></canvas>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        
        const N = 11;           
        const radius = 25;      
        const mainRadius = 250; 
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const vertices = [];

        function mulberry32(a) {
            return function() {
              let t = a += 0x6D2B79F5;
              t = Math.imul(t ^ t >>> 15, t | 1);
              t ^= t + Math.imul(t ^ t >>> 7, t | 61);
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const rand = mulberry32(5310); 

        const adjMatrix = [];
        const k = 1.0 - 1 * 0.02 - 0 * 0.005 - 0.25; 

        for (let i = 0; i < N; i++) {
            adjMatrix[i] = [];
            for (let j = 0; j < N; j++) {
                let val = rand() * 2.0;
                adjMatrix[i][j] = (val * k >= 1.0) ? 1 : 0;
            }
        }

        for (let i = 0; i < N; i++) {
            const angle = (2 * Math.PI * i) / N;
            vertices.push({
                x: centerX + mainRadius * Math.cos(angle),
                y: centerY + mainRadius * Math.sin(angle)
            });
        }

        function drawArrow(x1, y1, x2, y2) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const targetX = x2 - radius * Math.cos(angle);
            const targetY = y2 - radius * Math.sin(angle);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(targetX, targetY);
            ctx.lineTo(targetX - 12 * Math.cos(angle - Math.PI / 7), targetY - 12 * Math.sin(angle - Math.PI / 7));
            ctx.moveTo(targetX, targetY);
            ctx.lineTo(targetX - 12 * Math.cos(angle + Math.PI / 7), targetY - 12 * Math.sin(angle + Math.PI / 7));
            ctx.stroke();
        }

        function drawLoop(x, y, i) {
            const angle = Math.atan2(y - centerY, x - centerX);
            ctx.beginPath();
            ctx.arc(x + 15 * Math.cos(angle), y + 15 * Math.sin(angle), 15, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.strokeStyle = "#555";
        ctx.lineWidth = 1.5;
        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                if (adjMatrix[i][j] === 1) {
                    if (i === j) {
                        drawLoop(vertices[i].x, vertices[i].y, i);
                    } else {
                        drawArrow(vertices[i].x, vertices[i].y, vertices[j].x, vertices[j].y);
                    }
                }
            }
        }
        vertices.forEach((v, i) => {
            ctx.fillStyle = "#fff";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(v.x, v.y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#000";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(i + 1, v.x, v.y);
        });

    </script>
</body>
