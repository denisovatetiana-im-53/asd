
<head>
    <meta charset="UTF-8">
    <title>Характеристики та зв'язність графа (5310)</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .controls { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .canvas-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .section { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; width: 420px; }
        canvas { border: 1px solid #eee; background: #fff; margin-bottom: 10px; }
        pre { background: #f8f8f8; padding: 10px; font-size: 11px; width: 100%; box-sizing: border-box; white-space: pre-wrap; height: 120px; overflow-y: auto; border: 1px solid #ddd; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="controls">
    <h2>Лабораторна робота №4</h2>
    <button onclick="runAll()">Почати обчислення та малювання</button>
</div>

<div class="canvas-container">
    <div class="section">
        <h4>1. Напрямлений граф </h4>
        <canvas id="dirCanvas" width="400" height="400"></canvas>
        <pre id="dirData">Натисніть кнопку...</pre>
    </div>

    <div class="section">
        <h4>2. Модифікований граф </h4>
        <canvas id="modCanvas" width="400" height="400"></canvas>
        <pre id="modData">...</pre>
    </div>

    <div class="section">
        <h4>3. Граф конденсації </h4>
        <canvas id="condCanvas" width="400" height="400"></canvas>
        <pre id="condData">...</pre>
    </div>
</div>

<script>
const N = 11;
const radius = 18;

function mulberry32(a) {
    return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}

function runAll() {
    const rand = mulberry32(5310);
    const k1 = 1.0 - 1 * 0.01 - 0 * 0.01 - 0.3; 
    const k2 = 1.0 - 1 * 0.005 - 0 * 0.005 - 0.27;

    
    let adj1 = Array.from({length: N}, () => Array.from({length: N}, () => (rand() * 2.0 * k1 >= 1.0) ? 1 : 0));
    let adj2 = Array.from({length: N}, () => Array.from({length: N}, () => (rand() * 2.0 * k2 >= 1.0) ? 1 : 0));


    let inDeg = new Array(N).fill(0), outDeg = new Array(N).fill(0), undirDeg = new Array(N).fill(0);
    for(let i=0; i<N; i++) {
        for(let j=0; j<N; j++) {
            if(adj1[i][j]) { outDeg[i]++; inDeg[j]++; }
            if(i < j && (adj1[i][j] || adj1[j][i])) { undirDeg[i]++; undirDeg[j]++; }
            if(i === j && adj1[i][j]) undirDeg[i]+=2;
        }
    }
    document.getElementById('dirData').innerText = `Напівстепені (вхід/вихід):\n` + inDeg.map((v, i) => `${i+1}:${v}/${outDeg[i]}`).join(' | ') +
        `\n\nСтепені (ненапр.): ` + undirDeg.join(', ');

    let reach = adj2.map(row => [...row]);
    for(let i=0; i<N; i++) reach[i][i] = 1; 
    for(let k=0; k<N; k++) 
        for(let i=0; i<N; i++) 
            for(let j=0; j<N; j++) reach[i][j] = reach[i][j] || (reach[i][k] && reach[k][j]);

    let strong = reach.map((row, i) => row.map((val, j) => val && reach[j][i] ? 1 : 0));
    
    let components = [];
    let visited = new Array(N).fill(false);
    for(let i=0; i<N; i++) {
        if(!visited[i]) {
            let comp = [];
            for(let j=0; j<N; j++) if(strong[i][j]) { comp.push(j); visited[j]=true; }
            components.push(comp);
        }
    }

    document.getElementById('modData').innerText = "Матриця досяжності побудована.\nМатриця сильної зв'язності знайдена.\nДив. консоль (F12) для копіювання таблиць.";
    console.log("Матриця досяжності:", reach);
    console.log("Матриця сильної зв'язності:", strong);

    document.getElementById('condData').innerText = "Компоненти:\n" + components.map((c, i) => `K${i+1}: {${c.map(v=>v+1).join(',')}}`).join('\n');

    // Малювання
    draw(document.getElementById('dirCanvas'), adj1, false);
    draw(document.getElementById('modCanvas'), adj2, false);
    drawCond(document.getElementById('condCanvas'), components, adj2);
}

function draw(canvas, matrix, isCond) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const nodes = [];
    for(let i=0; i<N; i++) {
        const a = (2*Math.PI*i)/N;
        nodes.push({x: 200 + 160*Math.cos(a), y: 200 + 160*Math.sin(a)});
    }
    matrix.forEach((row, i) => row.forEach((val, j) => {
        if(val) drawArrow(ctx, nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y, i===j);
    }));
    nodes.forEach((n, i) => {
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(n.x, n.y, radius, 0, 7); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#000"; ctx.textAlign="center"; ctx.fillText(i+1, n.x, n.y+5);
    });
}

function drawCond(canvas, comps, originalAdj) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const nodes = [];
    const n = comps.length;
    for(let i=0; i<n; i++) {
        const a = (2*Math.PI*i)/n;
        nodes.push({x: 200 + 130*Math.cos(a), y: 200 + 130*Math.sin(a)});
    }

    ctx.strokeStyle = "#f00";
    for(let i=0; i<n; i++) {
        for(let j=0; j<n; j++) {
            if(i === j) continue;
            let connected = false;
            for(let u of comps[i]) for(let v of comps[j]) if(originalAdj[u][v]) connected = true;
            if(connected) drawArrow(ctx, nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y, false);
        }
    }

    nodes.forEach((n, i) => {
        ctx.fillStyle = "#e7f3ff"; ctx.beginPath(); ctx.arc(n.x, n.y, radius+5, 0, 7); ctx.fill(); 
        ctx.strokeStyle = "#007bff"; ctx.stroke();
        ctx.fillStyle = "#000"; ctx.font = "bold 12px Arial"; ctx.fillText(`K${i+1}`, n.x, n.y+5);
    });
}

function drawArrow(ctx, x1, y1, x2, y2, isLoop) {
    ctx.beginPath();
    if(isLoop) {
        ctx.arc(x1+15, y1-15, 10, 0, 7);
    } else {
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const tx = x2 - radius * Math.cos(angle);
        const ty = y2 - radius * Math.sin(angle);
        ctx.moveTo(x1, y1); ctx.lineTo(tx, ty);
        ctx.lineTo(tx - 8 * Math.cos(angle - Math.PI / 8), ty - 8 * Math.sin(angle - Math.PI / 8));
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - 8 * Math.cos(angle + Math.PI / 8), ty - 8 * Math.sin(angle + Math.PI / 8));
    }
    ctx.stroke();
}
</script>
</body>
